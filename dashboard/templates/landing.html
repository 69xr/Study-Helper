<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BotDash — Discord Control Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14; --surface: #0d1420; --border: #1e2d42;
      --accent: #4f9eff; --accent2: #00e5c3;
      --text: #e8f0fe; --muted: #5a7299;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(79,158,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,158,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Glow orbs */
    .glow-1, .glow-2 {
      position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px);
    }
    .glow-1 { width: 500px; height: 500px; top: -150px; left: -150px;
               background: rgba(79,158,255,.08); }
    .glow-2 { width: 400px; height: 400px; bottom: -100px; right: -100px;
               background: rgba(0,229,195,.06); }

    .hero {
      text-align: center; position: relative; z-index: 1;
      max-width: 560px; padding: 0 24px;
    }

    .logo-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(79,158,255,.1); border: 1px solid rgba(79,158,255,.2);
      border-radius: 100px; padding: 6px 16px; margin-bottom: 32px;
      font-family: 'Space Mono', monospace; font-size: 11px;
      letter-spacing: .1em; color: var(--accent);
    }
    .logo-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 700; line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, #4f9eff 60%, #00e5c3 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: 16px; color: var(--muted); line-height: 1.6;
      margin-bottom: 40px; font-weight: 400;
    }

    .cta {
      display: inline-flex; align-items: center; gap: 12px;
      background: var(--accent); color: #000;
      padding: 14px 28px; border-radius: 10px;
      font-size: 15px; font-weight: 700; text-decoration: none;
      transition: all .2s;
      box-shadow: 0 0 32px rgba(79,158,255,.3);
    }
    .cta:hover { background: #6fb0ff; transform: translateY(-2px); box-shadow: 0 0 48px rgba(79,158,255,.4); }
    .cta svg { width: 20px; height: 20px; }

    .features {
      display: flex; gap: 20px; margin-top: 48px; justify-content: center; flex-wrap: wrap;
    }
    .feature {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 16px 20px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace;
      min-width: 120px;
    }
    .feature .f-icon { font-size: 20px; }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="hero">
    <div class="logo-badge">
      <div class="dot"></div>
      BOTDASH v2.0
    </div>

    <h1>Discord<br>Control Panel</h1>
    <p class="sub">Manage your bot's settings, moderation, roles, and analytics — all from one sleek dashboard.</p>

    <a href="/login" class="cta">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.04.032.05a19.9 19.9 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      Login with Discord
    </a>

    <div class="features">
      <div class="feature"><span class="f-icon">⚙️</span>Settings</div>
      <div class="feature"><span class="f-icon">🛡️</span>Moderation</div>
      <div class="feature"><span class="f-icon">🎭</span>Roles</div>
      <div class="feature"><span class="f-icon">📊</span>Analytics</div>
      <div class="feature"><span class="f-icon">⊘</span>Blacklist</div>
    </div>
  </div>
</body>
</html>
