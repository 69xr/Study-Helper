<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}{{ brand.name }}{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08111d;--bg2:#0d1726;--panel:#101d31;--panel2:#13233a;--line:rgba(201,217,245,.12);
  --text:#edf4ff;--muted:#a9b6ca;--soft:#7f91aa;--brand:#58b7ff;--brand2:#7bd3ff;--mint:#49d8a8;--warn:#ffc164;
  --head:'Syne',sans-serif;--body:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow:0 28px 70px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--body);color:var(--text);min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(88,183,255,.18), transparent 24%),
    radial-gradient(circle at bottom right, rgba(73,216,168,.12), transparent 20%),
    linear-gradient(180deg,var(--bg),var(--bg2));
}
a{text-decoration:none;color:inherit}
.shell{max-width:1120px;margin:0 auto;padding:28px 22px 48px}
.nav{
  display:flex;justify-content:space-between;align-items:center;gap:16px;padding:14px 18px;
  border:1px solid var(--line);border-radius:22px;background:rgba(16,29,49,.78);backdrop-filter:blur(18px)
}
.nav-left,.nav-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{
  width:46px;height:46px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--brand),var(--mint));font-family:var(--head);font-weight:800;color:#08111d;overflow:hidden
}
.logo img{width:100%;height:100%;object-fit:cover}
.brand-name{font-family:var(--head);font-size:22px;line-height:1}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--brand2);margin-top:5px;text-transform:uppercase;letter-spacing:1px}
.nav-link{font-size:13px;color:var(--muted)}
.cta{
  display:inline-flex;align-items:center;justify-content:center;padding:11px 16px;border-radius:14px;
  border:1px solid var(--line);font-weight:700;font-size:13px
}
.cta.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#07121d;border:none}
.cta.ghost{background:rgba(255,255,255,.03)}
.wrap{padding-top:34px}
.hero{
  padding:28px;border-radius:30px;border:1px solid var(--line);background:rgba(16,29,49,.82);box-shadow:var(--shadow)
}
.kicker{font-family:var(--mono);font-size:11px;color:var(--brand2);text-transform:uppercase;letter-spacing:1.1px}
.hero h1{font-family:var(--head);font-size:clamp(34px,6vw,62px);line-height:1.02;margin-top:14px;max-width:760px}
.hero p{margin-top:14px;max-width:720px;color:var(--muted);font-size:16px;line-height:1.65}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}
.panel-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;margin-top:18px}
.card{
  background:rgba(16,29,49,.82);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:22px
}
.card h2{font-family:var(--head);font-size:24px;margin-bottom:10px}
.card p{color:var(--muted);line-height:1.7;font-size:14px}
.list{display:grid;gap:10px;margin-top:14px}
.item{
  padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03);font-size:14px;color:var(--muted)
}
.footer{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-top:18px;color:var(--soft);font-size:13px}
@media (max-width: 860px){
  .panel-grid{grid-template-columns:1fr}
  .nav{align-items:flex-start}
}
</style>
</head>
<body>
  <div class="shell">
    <div class="nav">
      <div class="nav-left">
        <div class="logo">{% if brand.logo_url %}<img src="{{ brand.logo_url }}" alt="{{ brand.name }}">{% else %}{{ brand.logo_text }}{% endif %}</div>
        <div>
          <div class="brand-name">{{ brand.name }}</div>
          <div class="brand-sub">{{ brand.dashboard_title }}</div>
        </div>
      </div>
      <div class="nav-right">
        <a class="nav-link" href="{{ url_for('index') }}">Home</a>
        <a class="nav-link" href="{{ url_for('support_page') }}">Support</a>
        <a class="nav-link" href="{{ url_for('contact_page') }}">Contact</a>
        <a class="nav-link" href="{{ url_for('policy_page') }}">Policy</a>
        <a class="cta ghost" href="{{ url_for('login') }}">Login</a>
      </div>
    </div>

    <div class="wrap">
      {% block content %}{% endblock %}
      <div class="footer">
        <span>{{ brand.footer_note }}</span>
        <span>{{ brand.support_email }}</span>
      </div>
    </div>
  </div>
</body>
</html>
